# Default values — override per environment in values-<env>.yaml files.
# NO secrets live here. All sensitive configuration is pulled from
# AWS Secrets Manager at pod startup.

replicaCount: 2

image:
  repository: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/amp-facebook-api
  pullPolicy: IfNotPresent
  tag: ""  # overridden by CI/CD pipeline (git SHA)

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: "amp-facebook-api-sa"
  # IRSA: grants the pod permission to call AWS Secrets Manager
  # without storing any static credentials.
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/amp-facebook-api-role"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:<REGION>:<ACCOUNT_ID>:certificate/<CERT_ID>"
  hosts:
    - host: amp-facebook-api.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Environment variables injected into the pod.
# AWS credentials come automatically via IRSA — not from here.
env:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  # AWS_REGION and AWS_SECRET_NAME are set below per-environment.
  AWS_REGION: "us-east-1"
  AWS_SECRET_NAME: "amp-facebook-api/prod"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
